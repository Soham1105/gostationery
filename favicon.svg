      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2a4a"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
